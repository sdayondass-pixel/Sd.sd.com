<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Ridhi Roy!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0914;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 3D Canvas Context */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Interactive Interface Overlays */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* Let clicks pass to 3D canvas unless it's a button */
            text-align: center;
            padding: 20px;
        }

        .interactive-element {
            pointer-events: auto;
        }

        h1 {
            color: #ffffff;
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 71, 126, 0.6);
            opacity: 0;
            animation: fadeIn 1.5s ease forwards 0.5s;
        }

        .btn {
            background: linear-gradient(45deg, #ff477e, #ff85a1);
            color: white;
            border: none;
            padding: 16px 36px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 71, 126, 0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 40px rgba(255, 71, 126, 0.8);
        }

        #surprise-card {
            display: none;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px 40px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            max-width: 450px;
            color: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: scaleUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .message-text {
            font-size: 1.5rem;
            line-height: 1.4;
            font-weight: 600;
            background: linear-gradient(45deg, #ffb3c6, #90e0ef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes scaleUp {
            from { transform: scale(0.6); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
    <!-- Include the Three.js Engine from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-layer">
        <div id="setup-view" class="interactive-element">
            <h1>For Ridhi Roy</h1>
            <p style="color: #ccc; margin-bottom: 30px;">Move your finger </p>
            <button class="btn" onclick="trigger3DExplosion()"> Click  ✨</button>
        </div>

        <div id="surprise-card">
            <p class="message-text">✨ Ridhi Roy, you are absolutely multi-dimensionally amazing!
                You deserve all the happiness in the world! ✨Ayon Das</p>
        </div>
    </div>

    <script>
        let scene, camera, renderer, heartMesh, particleSystem;
        let pCount = 300;
        let particlesGeometry;
        let isExploded = false;

        function init3D() {
            const container = document.getElementById('canvas-container');

            // 1. Create Scene
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0b0914, 0.015);

            // 2. Create Camera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 8;

            // 3. Setup WebGL Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            // 4. Add dynamic lighting sources
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight1 = new THREE.DirectionalLight(0xff70a6, 1.2);
            dirLight1.position.set(5, 5, 5);
            scene.add(dirLight1);

            const dirLight2 = new THREE.DirectionalLight(0x4dadf7, 0.8);
            dirLight2.position.set(-5, -5, 3);
            scene.add(dirLight2);

            // 5. Build 3D Extruded Heart Shape via Vector Math
            const heartShape = new THREE.Shape();
            heartShape.moveTo(0, 0);
            
            // X, Y coordinates defining a smooth curve mapping out a clean heart outline
            heartShape.bezierCurveTo(0, 1.2, 0.8, 2.0, 2.0, 2.0);
            heartShape.bezierCurveTo(3.5, 2.0, 3.5, 0.6, 3.5, 0.6);
            heartShape.bezierCurveTo(3.5, -0.6, 2.2, -2.0, 0, -3.6);
            heartShape.bezierCurveTo(-2.2, -2.0, -3.5, -0.6, -3.5, 0.6);
            heartShape.bezierCurveTo(-3.5, 0.6, -3.5, 2.0, -2.0, 2.0);
            heartShape.bezierCurveTo(-0.8, 2.0, 0, 1.2, 0, 0);

            const extrudeSettings = {
                depth: 1.2,
                bevelEnabled: true,
                bevelSegments: 5,
                steps: 2,
                bevelSize: 0.3,
                bevelThickness: 0.4
            };

            const geometry = new THREE.ExtrudeGeometry(heartShape, extrudeSettings);
            // Center the geometry origin properly
            geometry.center();

            const material = new THREE.MeshPhongMaterial({
                color: 0xff2a6d,
                shininess: 80,
                specular: 0xffb3c6,
                flatShading: false
            });

            heartMesh = new THREE.Mesh(geometry, material);
            heartMesh.scale.set(0.8, 0.8, 0.8);
            scene.add(heartMesh);

            // 6. Setup Floating 3D Sparkle System (Background/Explosion particles)
            particlesGeometry = new THREE.BufferGeometry();
            const positions = new Float32Array(pCount * 3);
            const velocities = [];

            for(let i = 0; i < pCount * 3; i+=3) {
                // Initial spread
                positions[i] = (Math.random() - 0.5) * 15;
                positions[i+1] = (Math.random() - 0.5) * 15;
                positions[i+2] = (Math.random() - 0.5) * 15;

                // Random directional trajectories
                velocities.push({
                    x: (Math.random() - 0.5) * 0.05,
                    y: (Math.random() - 0.5) * 0.05,
                    z: (Math.random() - 0.5) * 0.05
                });
            }

            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            particlesGeometry.userData = { velocities: velocities };

            // Material styling for the points
            const pMaterial = new THREE.PointsMaterial({
                color: 0xffe5ec,
                size: 0.15,
                transparent: true,
                opacity: 0.8
            });

            particleSystem = new THREE.Points(particlesGeometry, pMaterial);
            scene.add(particleSystem);

            // 7. Event listeners to track sizing and mouse movement
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);

            animateLoop();
        }

        let mouseX = 0, mouseY = 0;
        function onMouseMove(event) {
            // Track cursor coordinates normalized from -1 to 1
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 8. Continuous Render Render Pipeline Loop
        function animateLoop() {
            requestAnimationFrame(animateLoop);

            const time = Date.now() * 0.001;

            // Standard rotations & breathing hover animation
            if (heartMesh) {
                if (!isExploded) {
                    heartMesh.rotation.y = time * 0.8;
                    heartMesh.position.y = Math.sin(time * 2) * 0.25;
                } else {
                    // Rapid celebratory rotation after action is hit
                    heartMesh.rotation.y += 0.05;
                    heartMesh.rotation.x += 0.02;
                }
            }

            // Smooth camera easing tracking the mouse coordinates
            camera.position.x += (mouseX * 3 - camera.position.x) * 0.05;
            camera.position.y += (mouseY * 3 - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            // Particle movement system update
            const positions = particlesGeometry.attributes.position.array;
            const vels = particlesGeometry.userData.velocities;

            let index = 0;
            for(let i = 0; i < pCount; i++) {
                positions[index] += vels[i].x;
                positions[index+1] += vels[i].y;
                positions[index+2] += vels[i].z;

                // If particles spread out way too far, loop them back inward
                if (Math.abs(positions[index]) > 20 || isExploded === false && Math.random() > 0.995) {
                    positions[index] = isExploded ? 0 : (Math.random() - 0.5) * 12;
                    positions[index+1] = isExploded ? 0 : (Math.random() - 0.5) * 12;
                    positions[index+2] = isExploded ? 0 : (Math.random() - 0.5) * 12;
                }
                index += 3;
            }
            particlesGeometry.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }

        // Action Trigger Activation Logic
        function trigger3DExplosion() {
            isExploded = true;
            
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('surprise-card').style.display = 'block';

            // Flash material color to gold temporarily on pop
            heartMesh.material.color.setHex(0xffd700);
            
            // Speed up and scale down the main model structure quickly
            let scale = 0.8;
            const shrinkInterval = setInterval(() => {
                if (scale < 1.4 && scale > 0.1) {
                    scale -= 0.05;
                    heartMesh.scale.set(scale, scale, scale);
                } else {
                    clearInterval(shrinkInterval);
                    heartMesh.visible = false; // Vanish into particles
                }
            }, 20);

            // Reposition and accelerate all particle velocities drastically outward from center
            const vels = particlesGeometry.userData.velocities;
            const positions = particlesGeometry.attributes.position.array;
            
            let index = 0;
            for(let i = 0; i < pCount; i++) {
                // Collapse coordinates to origin center instantly
                positions[index] = 0;
                positions[index+1] = 0;
                positions[index+2] = 0;

                // Push high speed explosion mechanics outward
                vels[i].x = (Math.random() - 0.5) * 0.4;
                vels[i].y = (Math.random() - 0.5) * 0.4;
                vels[i].z = (Math.random() - 0.5) * 0.4;
                index += 3;
            }
            
            // Adjust glowing system appearance color attributes
            particleSystem.material.color.setHex(0xff70a6);
            particleSystem.material.size = 0.25;
        }

        // Fire everything up when page mounts
        window.onload = init3D;
    </script>
</body>
</html>
