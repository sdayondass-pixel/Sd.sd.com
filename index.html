<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ridhi Roy </title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#ff6ec4,#7873f5);
      overflow:hidden;
    }

    .card{
      text-align:center;
      background:white;
      padding:40px;
      border-radius:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.3);
      animation:float 3s ease-in-out infinite;
    }

    h1{
      font-size:45px;
      color:#ff4081;
      animation:glow 2s infinite alternate;
    }

    p{
      margin-top:15px;
      font-size:20px;
      color:#444;
    }

    .heart{
      font-size:60px;
      color:red;
      animation:beat 1s infinite;
      margin-top:20px;
    }

    @keyframes beat{
      0%{transform:scale(1);}
      50%{transform:scale(1.3);}
      100%{transform:scale(1);}
    }

    @keyframes glow{
      from{
        text-shadow:0 0 10px #ff4081;
      }
      to{
        text-shadow:0 0 25px #ff4081,0 0 40px #ff80ab;
      }
    }

    @keyframes float{
      0%{transform:translateY(0px);}
      50%{transform:translateY(-15px);}
      100%{transform:translateY(0px);}
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Ridhi Roy</h1>
    <p>Welcome</p>
    <div class="heart">❤</div>
  </div>

</body>
</html>
